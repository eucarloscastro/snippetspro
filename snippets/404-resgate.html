<!--
  Baixa Pace — Página 404 de Resgate
  ----------------------------------
  COLE ISTO EM: Google Tag Manager → Tags → New → Tag Type: "Custom HTML"
  GATILHO (Trigger): crie um trigger "Page View - DOM Ready" do tipo
    Custom Event / Page View, com condição:
      Page Path  →  matches RegEx  →  ^/produtos/
    (e o guard interno abaixo garante que só roda na 404 de verdade).
  Marque a opção "Support document.write" = NÃO.
-->
<script>
(function () {
  "use strict";

  // Só roda na 404 real (soft-404: HTTP 200 + <section id="page-error">)
  var errorSection = document.getElementById("page-error");
  if (!errorSection) return;
  if (document.getElementById("bp-404")) return; // evita injeção dupla

  var CATEGORIES = [
    { handle: "top-mais-vendidos-oculos-de-sol", title: "Largando na Elite", subtitle: "os mais vendidos, direto do pódio" },
    { handle: "lancamentos",                     title: "Novos no Pelotão",  subtitle: "recém-chegados, estreia agora" },
    { handle: "promocao",                        title: "Baixou o Pace",     subtitle: "preços que despencaram" }
  ];
  var MAX_PER_ROW = 12;
  var ORIGIN = "https://www.baixapace.com.br";
  var seen = {}; // dedup global de produtos entre carrosséis

  // ---------- analytics ----------
  function track(event, extra) {
    window.dataLayer = window.dataLayer || [];
    var payload = { event: event, page_type: "404_recovery" };
    if (extra) for (var k in extra) payload[k] = extra[k];
    window.dataLayer.push(payload);
  }

  // ---------- CSS ----------
  var css = ""
    + "#bp-404{font-family:'Blinker',Arial,sans-serif;max-width:1080px;margin:0 auto;}"
    + "#bp-404 .bp-hero{background:#111;color:#fff;text-align:center;padding:40px 22px;border-radius:10px;}"
    + "#bp-404 .bp-badge{display:inline-block;background:#c42020;color:#fff;font-size:11px;letter-spacing:1px;font-weight:600;padding:5px 13px;border-radius:40px;margin-bottom:16px;}"
    + "#bp-404 .bp-h1{font-size:30px;font-weight:700;line-height:1.18;margin:0 0 12px;}"
    + "#bp-404 .bp-sub{font-size:16px;line-height:1.6;color:#cfcfcf;max-width:460px;margin:0 auto 22px;}"
    + "#bp-404 .bp-cta{display:inline-block;background:#c42020;color:#fff;font-size:15px;font-weight:600;padding:12px 24px;border-radius:6px;text-decoration:none;cursor:pointer;}"
    + "#bp-404 .bp-row{margin:30px 0 6px;}"
    + "#bp-404 .bp-row-head{display:flex;align-items:baseline;justify-content:space-between;margin:0 4px 12px;}"
    + "#bp-404 .bp-row-title{font-size:20px;font-weight:700;color:#111;margin:0;}"
    + "#bp-404 .bp-row-subtitle{font-size:13px;color:#888;margin:2px 0 0;}"
    + "#bp-404 .bp-row-all{font-size:13px;color:#c42020;font-weight:600;text-decoration:none;white-space:nowrap;}"
    + "#bp-404 .bp-track{display:flex;gap:12px;overflow-x:auto;padding:4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}"
    + "#bp-404 .bp-track::-webkit-scrollbar{height:6px;}"
    + "#bp-404 .bp-track::-webkit-scrollbar-thumb{background:#ddd;border-radius:6px;}"
    + "#bp-404 .bp-card{flex:0 0 46%;max-width:200px;scroll-snap-align:start;border:1px solid #eee;border-radius:8px;padding:8px;text-decoration:none;color:#111;background:#fff;}"
    + "#bp-404 .bp-card-img{width:100%;height:130px;object-fit:contain;border-radius:6px;background:#f6f6f6;display:block;margin-bottom:8px;}"
    + "#bp-404 .bp-card-name{font-size:13px;line-height:1.3;color:#333;min-height:34px;}"
    + "#bp-404 .bp-card-price{font-size:14px;font-weight:700;color:#111;margin-top:4px;}"
    + "#bp-404 .bp-foot{border-top:1px solid #eee;margin-top:18px;padding:22px 4px 4px;text-align:center;}"
    + "#bp-404 .bp-foot-q{font-size:14px;color:#888;margin-bottom:12px;}"
    + "#bp-404 .bp-foot a{display:inline-block;font-size:14px;font-weight:600;padding:10px 20px;border-radius:6px;text-decoration:none;margin:4px;}"
    + "#bp-404 .bp-foot .bp-explore{border:1.5px solid #111;color:#111;}"
    + "#bp-404 .bp-foot .bp-wa{background:#25d366;color:#fff;}"
    + "@media(min-width:640px){#bp-404 .bp-card{flex:0 0 22%;}#bp-404 .bp-h1{font-size:36px;}}";
  var styleEl = document.createElement("style");
  styleEl.id = "bp-404-style";
  styleEl.appendChild(document.createTextNode(css));
  document.head.appendChild(styleEl);

  // ---------- esconde o "Erro - 404" original ----------
  var oldHeader = document.querySelector('section.page-header[data-store="page-title"]');
  if (oldHeader) oldHeader.style.display = "none";

  // ---------- monta o esqueleto ----------
  var wrap = document.createElement("div");
  wrap.id = "bp-404";
  wrap.innerHTML = ""
    + '<div class="bp-hero">'
    +   '<span class="bp-badge">ESGOTOU 🏁</span>'
    +   '<div class="bp-h1">Esse cruzou a linha antes de você</div>'
    +   '<div class="bp-sub">Nosso estoque gira rápido e esse modelo esgotou. Mas relaxa: o pelotão tá cheio de opção pra você não largar pra trás.</div>'
    +   '<a class="bp-cta" id="bp-scroll">Ver o pelotão ↓</a>'
    + '</div>'
    + '<div id="bp-rows"></div>'
    + '<div class="bp-foot">'
    +   '<div class="bp-foot-q">Não achou o que queria?</div>'
    +   '<a class="bp-explore" href="' + ORIGIN + '/produtos/">Explorar a loja</a>'
    +   '<a class="bp-wa" href="https://wa.me/" target="_blank" rel="noopener" data-bp-wa>Falar no WhatsApp</a>'
    + '</div>';

  // troca o conteúdo padrão (h2 + sugestões da Nuvemshop) pelo nosso bloco
  var container = errorSection.querySelector(".container") || errorSection;
  container.innerHTML = "";
  container.appendChild(wrap);

  // reaproveita o link de WhatsApp já existente no tema, se houver
  var waLink = document.querySelector('a[href*="wa.me"], a[href*="api.whatsapp.com"], a[href*="whatsapp.com/send"]');
  if (waLink) wrap.querySelector("[data-bp-wa]").href = waLink.href;

  document.getElementById("bp-scroll").addEventListener("click", function () {
    var first = document.querySelector("#bp-rows .bp-row");
    if (first) first.scrollIntoView({ behavior: "smooth", block: "start" });
    track("recovery_404_scroll");
  });

  track("recovery_404_shown", { broken_path: location.pathname });

  // ---------- busca + parse de uma categoria ----------
  function fetchCategory(cat) {
    return fetch(ORIGIN + "/" + cat.handle + "/", { credentials: "same-origin" })
      .then(function (r) { return r.ok ? r.text() : ""; })
      .then(function (html) {
        if (!html) return [];
        var doc = new DOMParser().parseFromString(html, "text/html");
        var items = doc.querySelectorAll(".js-item-product");
        var out = [];
        for (var i = 0; i < items.length && out.length < MAX_PER_ROW; i++) {
          var el = items[i];
          var link = el.querySelector("a.item-link");
          var nameEl = el.querySelector(".js-item-name");
          var priceEl = el.querySelector(".js-price-display");
          if (!link || !nameEl) continue;
          var url = link.getAttribute("href");
          if (!url || seen[url]) continue; // dedup global

          var img = "";
          var dv = el.querySelector("[data-variants]");
          if (dv) {
            try {
              var variants = JSON.parse(dv.getAttribute("data-variants"));
              if (variants && variants.length) {
                for (var v = 0; v < variants.length; v++) {
                  if (variants[v] && variants[v].image_url) { img = variants[v].image_url; break; }
                }
              }
            } catch (e) {}
          }
          if (!img) {
            var imgEl = el.querySelector("img");
            if (imgEl) {
              img = imgEl.getAttribute("data-src")
                 || (imgEl.getAttribute("data-srcset") || imgEl.getAttribute("srcset") || "").trim().split(/\s+/)[0]
                 || imgEl.getAttribute("src") || "";
              if (img.indexOf("data:") === 0) img = ""; // ignora placeholder gif
            }
          }
          if (img && img.indexOf("//") === 0) img = "https:" + img;

          seen[url] = true;
          out.push({
            url: url,
            name: nameEl.textContent.trim(),
            price: priceEl ? priceEl.textContent.trim() : "",
            img: img
          });
        }
        return out;
      })
      .catch(function () { return []; });
  }

  // ---------- renderiza uma linha ----------
  function renderRow(cat, products) {
    if (!products.length) return;
    var row = document.createElement("div");
    row.className = "bp-row";
    var cards = products.map(function (p) {
      return ''
        + '<a class="bp-card" href="' + p.url + '" data-bp-prod="' + cat.title + '">'
        +   '<img class="bp-card-img" loading="lazy" src="' + p.img + '" alt="' + p.name.replace(/"/g, "&quot;") + '">'
        +   '<div class="bp-card-name">' + p.name + '</div>'
        +   (p.price ? '<div class="bp-card-price">' + p.price + '</div>' : '')
        + '</a>';
    }).join("");
    row.innerHTML = ""
      + '<div class="bp-row-head">'
      +   '<div><div class="bp-row-title">' + cat.title + '</div><div class="bp-row-subtitle">' + cat.subtitle + '</div></div>'
      +   '<a class="bp-row-all" href="' + ORIGIN + "/" + cat.handle + '/">ver todos →</a>'
      + '</div>'
      + '<div class="bp-track">' + cards + '</div>';
    document.getElementById("bp-rows").appendChild(row);

    var trackLinks = row.querySelectorAll("[data-bp-prod]");
    for (var i = 0; i < trackLinks.length; i++) {
      trackLinks[i].addEventListener("click", function (ev) {
        track("recovery_404_product_click", { row: ev.currentTarget.getAttribute("data-bp-prod") });
      });
    }
  }

  // ---------- executa na ordem das categorias ----------
  (function loadSequential(i) {
    if (i >= CATEGORIES.length) return;
    fetchCategory(CATEGORIES[i]).then(function (products) {
      renderRow(CATEGORIES[i], products);
      loadSequential(i + 1);
    });
  })(0);

})();
</script>
